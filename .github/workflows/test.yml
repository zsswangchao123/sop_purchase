name: 自动测试

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: 后端测试
    runs-on: ubuntu-latest
    steps:
      - name: 获取代码
        uses: actions/checkout@v4
      - name: 配置 Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: 运行后端测试
        run: mvn -f backend/pom.xml test

  frontend:
    name: 前端测试与构建
    runs-on: ubuntu-latest
    steps:
      - name: 获取代码
        uses: actions/checkout@v4
      - name: 配置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: 安装依赖
        working-directory: frontend
        run: npm ci
      - name: 运行前端测试
        working-directory: frontend
        run: npm run test
      - name: 构建前端
        working-directory: frontend
        run: npm run build
